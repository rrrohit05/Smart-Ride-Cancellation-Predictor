<!DOCTYPE html>
<html>
<head>
    <title>Ride Cancellation Predictor</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4e8f0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 25px 0;
            text-align: center;
            color: #1f2937;
            font-weight: 600;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 22px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: #4338ca;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
        }

        .success {
            background: #ecfdf5;
            color: #065f46;
        }

        .cancelled {
            background: #fef2f2;
            color: #991b1b;
        }

        .confidence {
            margin-top: 6px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.85;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ride Cancellation Predictor</h2>

    <form action="/predict" method="post">

        <label>Vehicle Type</label>
        <select name="vehicle_type" required>
            <option value="Auto">Auto</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
        </select>

        <label>Pickup Location</label>
        <input type="text" name="pickup_location" placeholder="Area-1" required>

        <label>Drop Location</label>
        <input type="text" name="drop_location" placeholder="Area-5" required>

        <label>Payment Method</label>
        <select name="payment_method" required>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
        </select>

        <label>Booking Day (0=Mon, 6=Sun)</label>
        <input type="number" name="booking_day" min="0" max="6" required>

        <label>Booking Hour (0-23)</label>
        <input type="number" name="booking_hour" min="0" max="23" required>

        <button type="submit">Predict Cancellation Risk</button>
    </form>

    {% if prediction %}
        <div class="result-box {% if prediction == 'Success' %}success{% else %}cancelled{% endif %}">
            Prediction: {{ prediction }}
            <div class="confidence">
                Cancellation Probability: {{ confidence }}%
            </div>
        </div>
    {% endif %}

    <div class="footer">
        ML-powered prediction system
    </div>
</div>

</body>
</html>
